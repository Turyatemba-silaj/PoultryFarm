{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Poultry Farm Account{% endblock %}</title>
    <style>
        :root { --bg:#f4f6f8; --surface:#fff; --text:#172033; --muted:#667085; --line:#d9e0ea; --primary:#176b87; --primary-dark:#0f4c5c; --danger:#b42318; }
        * { box-sizing: border-box; }
        body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 18px; background: var(--bg); color: var(--text); font-family: "Segoe UI", Arial, sans-serif; font-size: 12px; }
        .auth-card { width: min(360px, 100%); background: var(--surface); border: 1px solid var(--line); border-radius: 8px; padding: 22px; box-shadow: 0 18px 45px rgba(23,32,51,.08); }
        .brand { display: grid; justify-items: center; gap: 8px; margin-bottom: 18px; text-align: center; }
        .brand-mark { width: 46px; height: 46px; display: grid; place-items: center; border-radius: 8px; background: #f7c948; line-height: 1; overflow: hidden; }
        .brand-mark img { width: 44px; height: 44px; display: block; object-fit: cover; border-radius: 6px; }
        h1 { margin: 0 0 14px; font-size: 18px; text-align: center; }
        .field { margin-bottom: 12px; }
        label { display: block; margin-bottom: 5px; font-weight: 700; }
        input { width: 100%; min-height: 36px; padding: 8px 10px; border: 1px solid #c8d2df; border-radius: 7px; }
        input:focus { outline: 3px solid rgba(23,107,135,.16); border-color: var(--primary); }
        .button { width: 100%; min-height: 36px; border: 0; border-radius: 7px; background: var(--primary); color: #fff; font-weight: 800; cursor: pointer; }
        .button:hover { background: var(--primary-dark); }
        .links { display: flex; justify-content: center; gap: 12px; margin-top: 12px; }
        a { color: var(--primary-dark); font-weight: 700; text-decoration: none; }
        .errors, .errorlist { color: var(--danger); margin: 8px 0; padding-left: 18px; }
        .helptext { display: block; color: var(--muted); margin-top: 5px; font-size: 11px; }
    </style>
</head>
<body>
    <main class="auth-card">
        <div class="brand">
            <span class="brand-mark" aria-label="Poultry Farm logo"><img src="{% static 'FarmApplication/images/business-logo-chick.png' %}" alt="Poultry Farm logo"></span>
            <strong>Poultry Farm</strong>
        </div>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
