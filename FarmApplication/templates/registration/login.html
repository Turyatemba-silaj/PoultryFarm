{% extends "registration/auth_base.html" %}
{% block title %}Login | Poultry Farm{% endblock %}
{% block content %}
<h1>Login</h1>
{% if form.errors %}<div class="errors">Invalid username or password.</div>{% endif %}
<form method="post">
    {% csrf_token %}
    <div class="field">
        <label for="id_username">Username</label>
        {{ form.username }}
    </div>
    <div class="field">
        <label for="id_password">Password</label>
        {{ form.password }}
    </div>
    <button class="button" type="submit">Login</button>
    <div class="links"><a href="{% url 'password_reset' %}">Reset Password</a></div>
</form>
{% endblock %}
